name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e-arsip-desa
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e-arsip-desa/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npm test
        env:
          JWT_SECRET: test-jwt-secret-for-ci